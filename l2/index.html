<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style/main.css">
    <title>Таблиці</title>
</head>

<body>
    <table>
        <caption>Росклад дзвінків</caption>
        <thead>
            <tr>
                <th>№</th>
                <th>Початок</th>
                <th>Кінець</th>
                <th>Перерва</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="3">1</td>
                <td>8.00</td>

            </tr>
            <tr>
                <td rowspan="2">2</td>
                <td>8.50</td>
                <td>9,35</td>
                <td>10</td>
            </tr>
            <tr>
                <td>3</td>
                <td>9.45</td>
                <td>10.30</td>

            </tr>
            <tr>
                <td>4</td>
                <td>10.35</td>
                <td>11.20</td>
                <td>30</td>
            </tr>
            <tr>
                <td>5</td>
                <td>11.50</td>
                <td>12.35</td>
                <td>5</td>
            </tr>
            <tr>
                <td>6</td>
                <td>12.40</td>
                <td>13.25</td>
                <td>20</td>
            </tr>

        </tbody>
    </table>
</body>

</html>
